name: enythingmobilenew
description: "Enything - Everything. Everywhere. Instantly."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  pinput: ^4.0.0
  supabase_flutter: ^2.3.0
  flutter_dotenv: ^6.0.1
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  latlong2: ^0.9.0
  geolocator: ^13.0.2
  fl_chart: ^0.68.0
  image_picker: ^1.0.5
  http: ^1.1.2
  intl: ^0.19.0
  url_launcher: ^6.2.2
  uuid: ^4.2.1
  timeago: ^3.6.0
  fluttertoast: ^9.1.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.2
  google_fonts: ^6.2.1
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.1.0
  smooth_page_indicator: ^1.1.0
  badges: ^3.1.2
  flutter_slidable: ^3.1.0
  flutter_map: ^8.3.0
  razorpay_flutter: ^1.3.5
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.1.2
  crypto: ^3.0.7
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/google_fonts/
    - logo/
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/google_fonts/Outfit-Regular.ttf
        - asset: assets/google_fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/google_fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/google_fonts/Outfit-Bold.ttf
          weight: 700
        - asset: assets/google_fonts/Outfit-ExtraBold.ttf
          weight: 800
        - asset: assets/google_fonts/Outfit-Black.ttf
          weight: 900
    - family: Inter
      fonts:
        - asset: assets/google_fonts/Inter-Regular.ttf
        - asset: assets/google_fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/google_fonts/Inter-SemiBold.ttf
          weight: 600

